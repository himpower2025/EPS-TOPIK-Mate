<svg viewBox="0 0 300 280" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="300" height="280" fill="white"/>
  <!-- 메뉴판 배경 -->
  <rect x="30" y="20" width="240" height="240" fill="#2c1810" rx="8"/>
  <rect x="38" y="28" width="224" height="224" fill="#3d2314" rx="6"/>
  <!-- 제목 -->
  <text x="150" y="62" text-anchor="middle" font-size="18" font-weight="bold" fill="#f5c842">식 당 메 뉴</text>
  <line x1="50" y1="72" x2="250" y2="72" stroke="#f5c842" stroke-width="1.5"/>

  <!-- 메뉴 항목들 -->
  <text x="60" y="105" font-size="14" fill="white">라면</text>
  <text x="240" y="105" text-anchor="end" font-size="14" fill="#f5c842">3,000원</text>
  <line x1="50" y1="115" x2="250" y2="115" stroke="#5a3a25" stroke-width="0.5"/>

  <text x="60" y="145" font-size="14" fill="white">칼국수</text>
  <text x="240" y="145" text-anchor="end" font-size="14" fill="#f5c842">4,000원</text>
  <line x1="50" y1="155" x2="250" y2="155" stroke="#5a3a25" stroke-width="0.5"/>

  <text x="60" y="185" font-size="14" fill="white">비빔밥</text>
  <text x="240" y="185" text-anchor="end" font-size="14" fill="#f5c842">5,000원</text>
  <line x1="50" y1="195" x2="250" y2="195" stroke="#5a3a25" stroke-width="0.5"/>

  <text x="60" y="225" font-size="14" fill="white">순두부찌개</text>
  <text x="240" y="225" text-anchor="end" font-size="14" fill="#f5c842">4,500원</text>

  <line x1="50" y1="235" x2="250" y2="235" stroke="#f5c842" stroke-width="1"/>
</svg>
