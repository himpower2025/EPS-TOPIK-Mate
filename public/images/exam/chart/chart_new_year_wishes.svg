<svg viewBox="0 0 400 320" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="400" height="320" fill="white"/>
  <text x="200" y="28" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a1a2e">새해에 바라는 것</text>
  <!-- 파이차트 중심 200,175 반지름 100 -->
  <!-- 가정의 행복 41% → 0~147.6도 -->
  <path d="M200,175 L200,75 A100,100 0 0,1 293,225 Z" fill="#e74c3c"/>
  <!-- 건강 21% → 147.6~223.2도 -->
  <path d="M200,175 L293,225 A100,100 0 0,1 162,272 Z" fill="#3498db"/>
  <!-- 경제적 안정 19% → 223.2~291.6도 -->
  <path d="M200,175 L162,272 A100,100 0 0,1 108,118 Z" fill="#2ecc71"/>
  <!-- 자기능력 16% → 291.6~349.2도 -->
  <path d="M200,175 L108,118 A100,100 0 0,1 191,75 Z" fill="#f39c12"/>
  <!-- 여행 3% → 349.2~360도 -->
  <path d="M200,175 L191,75 A100,100 0 0,1 200,75 Z" fill="#9b59b6"/>
  <!-- 범례 -->
  <rect x="30" y="285" width="12" height="12" fill="#e74c3c"/>
  <text x="46" y="295" font-size="10" fill="#333">가정의 행복 41%</text>
  <rect x="130" y="285" width="12" height="12" fill="#3498db"/>
  <text x="146" y="295" font-size="10" fill="#333">건강 21%</text>
  <rect x="210" y="285" width="12" height="12" fill="#2ecc71"/>
  <text x="226" y="295" font-size="10" fill="#333">경제적 안정 19%</text>
  <rect x="30" y="305" width="12" height="12" fill="#f39c12"/>
  <text x="46" y="315" font-size="10" fill="#333">자기능력 향상 16%</text>
  <rect x="180" y="305" width="12" height="12" fill="#9b59b6"/>
  <text x="196" y="315" font-size="10" fill="#333">여행 3%</text>
  <!-- 중앙 레이블 -->
  <text x="220" y="155" font-size="11" font-weight="bold" fill="white">41%</text>
</svg>
