<svg viewBox="0 0 320 300" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="320" height="300" fill="white"/>
  <text x="160" y="28" text-anchor="middle" font-size="15" font-weight="bold" fill="#1a1a2e">건물 안내도</text>
  <!-- 테두리 -->
  <rect x="30" y="40" width="260" height="235" fill="#f8f9fa" stroke="#333" stroke-width="2" rx="4"/>
  <!-- 각 층 -->
  <!-- B1 -->
  <rect x="30" y="228" width="260" height="47" fill="#e8e8e8" stroke="#ccc" stroke-width="0.5"/>
  <text x="75" y="257" text-anchor="middle" font-size="12" font-weight="bold" fill="#666">B1</text>
  <line x1="110" y1="228" x2="110" y2="275" stroke="#ccc" stroke-width="1"/>
  <text x="200" y="257" text-anchor="middle" font-size="12" fill="#555">주차장</text>
  <!-- 1층 -->
  <rect x="30" y="181" width="260" height="47" fill="white" stroke="#ccc" stroke-width="0.5"/>
  <text x="75" y="210" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">1F</text>
  <line x1="110" y1="181" x2="110" y2="228" stroke="#ccc" stroke-width="1"/>
  <text x="200" y="205" text-anchor="middle" font-size="11" fill="#333">행복약국</text>
  <text x="200" y="220" text-anchor="middle" font-size="11" fill="#333">하나부동산</text>
  <!-- 2층 -->
  <rect x="30" y="134" width="260" height="47" fill="white" stroke="#ccc" stroke-width="0.5"/>
  <text x="75" y="163" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">2F</text>
  <line x1="110" y1="134" x2="110" y2="181" stroke="#ccc" stroke-width="1"/>
  <text x="200" y="162" text-anchor="middle" font-size="12" fill="#333">수진미용실</text>
  <!-- 3층 -->
  <rect x="30" y="87" width="260" height="47" fill="white" stroke="#ccc" stroke-width="0.5"/>
  <text x="75" y="116" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">3F</text>
  <line x1="110" y1="87" x2="110" y2="134" stroke="#ccc" stroke-width="1"/>
  <text x="200" y="115" text-anchor="middle" font-size="12" fill="#333">서울은행</text>
  <!-- 4층 -->
  <rect x="30" y="40" width="260" height="47" fill="white" stroke="#ccc" stroke-width="0.5"/>
  <text x="75" y="58" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">4F</text>
  <line x1="110" y1="40" x2="110" y2="87" stroke="#ccc" stroke-width="1"/>
  <text x="190" y="55" text-anchor="middle" font-size="11" fill="#333">한국치과</text>
  <text x="190" y="70" text-anchor="middle" font-size="11" fill="#333">한강내과</text>
  <!-- 5층 별도 추가 -->
  <!-- 안내 텍스트 -->
  <text x="160" y="292" text-anchor="middle" font-size="10" fill="#888">※ 5F: 강남여행사</text>
</svg>
