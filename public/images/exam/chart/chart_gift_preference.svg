<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="400" height="300" fill="white"/>
  <text x="200" y="28" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a1a2e">귀국 선물로 사고 싶은 것 (%)</text>
  <line x1="55" y1="40" x2="55" y2="230" stroke="#333" stroke-width="1.5"/>
  <line x1="55" y1="230" x2="375" y2="230" stroke="#333" stroke-width="1.5"/>
  <text x="48" y="234" text-anchor="end" font-size="9" fill="#555">0</text>
  <text x="48" y="184" text-anchor="end" font-size="9" fill="#555">20</text>
  <text x="48" y="134" text-anchor="end" font-size="9" fill="#555">40</text>
  <text x="48" y="84" text-anchor="end" font-size="9" fill="#555">60</text>
  <line x1="53" y1="180" x2="375" y2="180" stroke="#eee" stroke-width="1"/>
  <line x1="53" y1="130" x2="375" y2="130" stroke="#eee" stroke-width="1"/>
  <line x1="53" y1="80" x2="375" y2="80" stroke="#eee" stroke-width="1"/>
  <!-- 화장품 20% → 50px (최대60%=150px) -->
  <rect x="65" y="180" width="55" height="50" fill="#e91e8c"/>
  <text x="92" y="176" text-anchor="middle" font-size="10" fill="#e91e8c">20%</text>
  <text x="92" y="248" text-anchor="middle" font-size="10" fill="#333">화장품</text>
  <!-- 전자제품 60% → 150px → 정답 -->
  <rect x="150" y="80" width="55" height="150" fill="#e74c3c"/>
  <text x="177" y="76" text-anchor="middle" font-size="10" font-weight="bold" fill="#e74c3c">60%</text>
  <text x="177" y="248" text-anchor="middle" font-size="10" fill="#333">전자제품</text>
  <!-- 기념품 15% → 37.5px -->
  <rect x="235" y="193" width="55" height="37" fill="#3498db"/>
  <text x="262" y="189" text-anchor="middle" font-size="10" fill="#3498db">15%</text>
  <text x="262" y="248" text-anchor="middle" font-size="10" fill="#333">기념품</text>
  <!-- 현금 5% →12.5px -->
  <rect x="320" y="218" width="55" height="12" fill="#95a5a6"/>
  <text x="347" y="214" text-anchor="middle" font-size="10" fill="#95a5a6">5%</text>
  <text x="347" y="248" text-anchor="middle" font-size="10" fill="#333">현금</text>
  <text x="200" y="275" text-anchor="middle" font-size="10" fill="#888">(단위: %)</text>
</svg>
